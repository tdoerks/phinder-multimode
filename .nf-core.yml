repository_type: pipeline

nf_core_version: 4.0.2

lint:
  # Disabled: both crash with an uncaught JSONDecodeError in nf-core 4.0.2
  # (files_unchanged re-invokes `pipelines create`; container_configs parses `nextflow inspect`).
  files_unchanged: False
  container_configs: False
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config:
    - report_comment
  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-phinder_logo_light.png
    - docs/images/nf-core-phinder_logo_light.png
    - docs/images/nf-core-phinder_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml

template:
  org: tdoerks
  name: phinder
  description: Unified phage-isolate characterization from short, long, or hybrid
    sequencing reads
  author: tdoerks
  version: 1.0.0dev
  force: true
  outdir: /workspace/phinder
  is_nfcore: false
